<div class="max-w-full mx-10 my-auto p-0 font-sans">
  <h1
    class="font-bold text-4xl text-center bg-gradient-to-r from-green-800 to-green-600 bg-clip-text text-transparent mt-6 p-4">
    Todo Manager</h1>
  <div *ngIf="errorMessage">
    {{ errorMessage }}
    <button (click)="errorMessage = ''"
      class="bg-red-400 m-2 px-8 py-1 rounded-full hover:bg-red-400 font-semibold radius-full transition-colors">X</button>
  </div>


  <!--Add New Todo Form-->
  <div class=" flex flex-col items-center justify-center bg-white font-sans">
    <h2 class="font-semibold text-3xl my-10">Add New Task</h2>
    <input class="w-full font-semibold px-4 py-3 bg-gray-200 border rounded-lg text-gray-700 mb-4"
      [(ngModel)]="newTodo.title" placeholder="Task title (required)">
    <input class="w-full font-semibold px-4 py-3 bg-gray-200 border rounded-lg text-gray-700 mb-4"
      [(ngModel)]="newTodo.description" placeholder="Task description (optional)">
    <button
      class="bg-primary-default hover:bg-primary-hover transition-colors mt-3 w-full py-2 text-white text-lg rounded-lg"
      (click)="addTodo()">+Add Task</button>
  </div>
</div>
